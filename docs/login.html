<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body {
        background: linear-gradient(135deg, #f3f7ff, #eef7ff);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px;
    }
    .login-card {
        width: 100%;
        max-width: 420px;
        padding: 2rem;
        border-radius: 1rem;
        box-shadow: 0 16px 40px rgba(0,0,0,0.08);
        background-color: #ffffff;
        border: 1px solid #e2e8f0;
    }
    .login-card h2 {
        text-align: center;
        margin-bottom: .5rem;
        font-weight: 700;
        color: #1e293b;
    }
    .sub {
        text-align: center;
        color: #64748b;
        margin-bottom: 1.5rem;
        font-size: 14px;
    }
</style>
</head>
<body>
<div class="login-card">
    <h2>로그인</h2>
    <div class="sub">GitHub Pages 데모용 정적 로그인 화면입니다.</div>
    <div id="errorBox" class="alert alert-danger d-none"></div>
    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">아이디</label>
        <input type="text" id="userid" name="userid" class="form-control" placeholder="아이디 입력" required>
      </div>
      <div class="mb-3">
        <label class="form-label">비밀번호</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="비밀번호 입력" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">로그인</button>
    </form>
    <div class="mt-3 text-center">
        <small class="text-muted">계정이 없으신가요? <a href="join.html">회원가입</a></small>
    </div>
    <div class="mt-2 text-center">
        <small class="text-muted">테스트 계정: <strong>demo / 1234</strong></small>
    </div>
</div>
<script>
  const errorBox = document.getElementById('errorBox');
  const recent = localStorage.getItem('recentJoinUser');
  if (recent) {
    document.getElementById('userid').value = recent;
    localStorage.removeItem('recentJoinUser');
  }

  document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    const userid = document.getElementById('userid').value.trim();
    const password = document.getElementById('password').value;
    const users = JSON.parse(localStorage.getItem('demoUsers') || '[]');
    const matched = users.find(user => user.id === userid && user.pw === password);

    if ((userid === 'demo' && password === '1234') || matched) {
      localStorage.setItem('currentUser', matched ? matched.name || matched.id : '데모 사용자');
      location.href = 'index.html';
      return;
    }

    errorBox.textContent = '아이디 또는 비밀번호가 일치하지 않습니다.';
    errorBox.classList.remove('d-none');
  });
</script>
</body>
</html>
